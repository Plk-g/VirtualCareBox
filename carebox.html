<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Virtual Care Box</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles/site.css" />
  </head>
  <body class="page-carebox">
    <div class="carebox-container">
      <img src="assets/images/carebox.png" alt="Care Box" class="carebox-img" />

      <img
        src="assets/images/goku.png"
        alt="Goku plushie"
        class="item"
        id="item-goku"
        data-name="Goku Plushie"
        data-message="Goku shall energizes you!"
      />
      <img
        src="assets/images/lindt.png"
        alt="Lindt chocolate"
        class="item"
        id="item-lindt"
        data-name="Lindt Chocolate"
        data-message="Your fav chocolates, sweet like your smile to melt away that cold."
      />
      <img
        src="assets/images/cookie.png"
        alt="Chocolate chip cookies"
        class="item"
        id="item-cookie"
        data-name="Chocolate Chip Cookies"
        data-message="Warm, gooey, and sweet — just like how I’d cuddle you."
      />
      <img
        src="assets/images/tea.png"
        alt="Cup of Indian chai"
        class="item"
        id="item-tea"
        data-name="Indian Tea"
        data-message="Made chai for you and coffee for me hehe"
      />
      <img
        src="assets/images/ichiran.png"
        alt="Ichiran ramen bowl"
        class="item"
        id="item-ramen"
        data-name="Ichiran Ramen"
        data-message="Duh! Your Fav soup bowl: Slurppp"
      />
      <img
        src="assets/images/blanket.png"
        alt="Cozy throw blanket"
        class="item"
        id="item-blanket"
        data-name="Throw Blanket"
        data-message="Until I can be your blanket again"
      />
      <img
        src="assets/images/card.png"
        alt="Get well soon card"
        class="item"
        id="item-card"
        data-name="Get Well Soon Card"
        data-message="Sending you healing vibes!"
      />
      <img
        src="assets/images/rose.png"
        alt="Bouquet of blue roses"
        class="item"
        id="item-roses"
        data-name="Blue Roses Bouquet"
        data-message="Virtual flowers till I can get you real ones."
      />
      <img
        src="assets/images/tissues.png"
        alt="Box of tissues"
        class="item"
        id="item-tissues"
        data-name="Tissue Box"
        data-message="Certified to handle epic nose-drama."
      />
    </div>

    <div class="popup-overlay" id="popup" aria-hidden="true">
      <div
        class="popup"
        role="dialog"
        aria-modal="true"
        aria-labelledby="popup-name"
        aria-describedby="popup-message"
      >
        <h2 id="popup-name"></h2>
        <p id="popup-message"></p>
        <button id="popup-close">Close</button>
      </div>
    </div>
    <script src="assets/scripts/carebox.js" defer></script>
  </body>
</html>
